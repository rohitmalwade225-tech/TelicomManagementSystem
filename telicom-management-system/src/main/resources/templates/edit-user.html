<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile | Telecom</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div class="full-page-center">
        <div class="glass-card" style="width: 100%; max-width: 550px;">
            <div class="d-flex align-items-center gap-3 mb-4">
                <a href="/users" class="text-white-50 fs-4 text-decoration-none"><i class="fa-solid fa-arrow-left"></i></a>
                <h2 class="section-title m-0">Update User Settings</h2>
            </div>
            
            <p class="text-white-50 mb-4">Amend structural details belonging to user configurations.</p>

            <form th:action="@{/updateUser}" th:object="${user}" method="post">
                <input type="hidden" th:field="*{userId}">

                <div class="mb-3">
                    <label class="form-label text-white-50 small">Full Name</label>
                    <input type="text" th:field="*{fullName}" class="form-control" placeholder="Enter Full Name" required>
                </div>

                <div class="mb-3">
                    <label class="form-label text-white-50 small">Mobile Link Identifier</label>
                    <input type="text" th:field="*{mobileNumber}" class="form-control" placeholder="Enter Mobile Number" required>
                </div>

                <div class="mb-4">
                    <label class="form-label text-white-50 small">Email Address</label>
                    <input type="email" th:field="*{email}" class="form-control" placeholder="Enter Email Address" required>
                </div>

                <div class="d-flex gap-3">
                    <a href="/users" class="custom-btn btn-danger-custom w-50">Cancel</a>
                    <button type="submit" class="custom-btn btn-primary-custom w-50">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
