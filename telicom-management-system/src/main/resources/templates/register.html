<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Operator Enrollment | Telecom</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div class="full-page-center">
        <div class="glass-card" style="width: 460px; padding: 40px 35px;">
            
            <div class="text-center mb-4">
                <h1 class="page-title mb-1" style="font-size: 32px;">Create Account</h1>
                <p class="text-white-50 small">Register a new access profile to the management portal</p>
            </div>

            <form th:action="@{/register}" th:object="${user}" method="post">
                <div class="mb-3">
                    <input type="text" name="fullName" class="form-control" placeholder="Full Identity Name" required>
                </div>

                <div class="mb-3">
                    <input type="text" name="mobileNumber" class="form-control" placeholder="Mobile Connection Identifier" required>
                </div>

                <div class="mb-3">
                    <input type="email" name="email" class="form-control" placeholder="Corporate Email Address" required>
                </div>

                <div class="mb-4">
                    <input type="password" name="password" class="form-control" placeholder="System Password Token" required>
                </div>

                <button type="submit" class="custom-btn btn-primary-custom w-100 py-3 mb-3">
                    Initialize Profile <i class="fa-solid fa-user-check ms-1"></i>
                </button>
            </form>

            <div class="text-center mt-3">
                <a th:href="@{/login}" class="text-info small text-decoration-none">
                    <i class="fa-solid fa-arrow-left me-1"></i> Existing operator? Back to Gateway Login
                </a>
            </div>
            
        </div>
    </div>

</body>
</html>
