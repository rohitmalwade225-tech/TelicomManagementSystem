<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Transaction Ledgers | Telecom</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div class="sidebar">
        <h2>📡 Telecom</h2>
        <a href="/dashboard"><i class="fa fa-home"></i> Dashboard</a>
        <a href="/users"><i class="fa fa-users"></i> Users</a>
        <a href="/plans"><i class="fa fa-signal"></i> Plans</a>
        <a href="/recharge" class="active"><i class="fa fa-wallet"></i> Recharge</a>
    </div>

    <div class="main-content">
        <div class="mb-5">
            <h1 class="page-title m-0">Transaction Desk</h1>
            <p class="text-white-50 m-0">Trigger credit updates and balance injection payloads manually into targeted accounts.</p>
        </div>

        <div class="glass-card p-4 mb-4">
            <h4 class="text-white fw-bold mb-3"><i class="fa-solid fa-money-bill-transfer text-warning me-2"></i>Instantiate Balance Dispatch</h4>
            <form method="post" th:action="@{/recharge/save}">
                <div class="row g-3">
                    <div class="col-md-5">
                        <input type="text" name="mobileNumber" class="form-control" placeholder="Target Endpoint Number" required>
                    </div>
                    <div class="col-md-5">
                        <input type="number" name="amount" class="form-control" placeholder="Payload Amount ($)" required>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="custom-btn btn-warning-custom w-100 h-100">
                            Authorize 
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <div class="table-responsive-wrapper">
            <table class="custom-table">
                <thead>
                    <tr>
                        <th>Transaction Hash ID</th>
                        <th>Target Mobile Client</th>
                        <th>Dispatched Balance</th>
                        <th>Execution Timestamp</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r:${history}">
                        <td class="text-white-50 small font-monospace" th:text="${r.rechargeId}"></td>
                        <td class="fw-semibold" th:text="${r.mobileNumber}"></td>
                        <td class="text-warning fw-bold" th:text="${r.amount}"></td>
                        <td class="text-white-50" th:text="${r.rechargeDate}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
