<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Plan Provisioning | Telecom</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div class="sidebar">
        <h2>📡 Telecom</h2>
        <a href="/dashboard"><i class="fa fa-home"></i> Dashboard</a>
        <a href="/users"><i class="fa fa-users"></i> Users</a>
        <a href="/plans" class="active"><i class="fa fa-signal"></i> Plans</a>
        <a href="/recharge"><i class="fa fa-wallet"></i> Recharge</a>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h1 class="page-title m-0">Subscription Plans</h1>
                <p class="text-white-50 m-0">Create, deploy and audit global customer pricing tiers</p>
            </div>
        </div>

        <div class="glass-card p-4 mb-4">
            <h4 class="text-white fw-bold mb-3"><i class="fa-solid fa-square-plus text-info me-2"></i>Provision New Plan Variant</h4>
            <form method="post" th:action="@{/plans/save}">
                <div class="row g-3">
                    <div class="col-md-3">
                        <input name="planName" placeholder="Plan Product Label" class="form-control" required>
                    </div>
                    <div class="col-md-2">
                        <input name="price" placeholder="Price ($)" class="form-control" required>
                    </div>
                    <div class="col-md-3">
                        <input name="validity" placeholder="Validity Frame (e.g. 28 Days)" class="form-control" required>
                    </div>
                    <div class="col-md-2">
                        <input name="dataLimit" placeholder="Bandwidth allocation" class="form-control" required>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="custom-btn btn-primary-custom w-100 h-100">
                            Deploy Plan
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <div class="table-responsive-wrapper">
            <table class="custom-table">
                <thead>
                    <tr>
                        <th>Global SKU ID</th>
                        <th>Product Label Name</th>
                        <th>Billing Value</th>
                        <th>Lifespan Term</th>
                        <th>Bandwidth Allocation Quota</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p:${plans}">
                        <td class="fw-bold text-white-50" th:text="${p.planId}"></td>
                        <td class="text-info fw-semibold" th:text="${p.planName}"></td>
                        <td th:text="${p.price}"></td>
                        <td th:text="${p.validity}"></td>
                        <td><span class="badge bg-dark text-success border border-success px-2 py-2" th:text="${p.dataLimit}"></span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
