<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Accounts Registry | Telecom</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div class="sidebar">
        <h2>📡 Telecom</h2>
        <a href="/dashboard"><i class="fa fa-home"></i> Dashboard</a>
        <a href="/users" class="active"><i class="fa fa-users"></i> Users</a>
        <a href="/plans"><i class="fa fa-signal"></i> Plans</a>
        <a href="/recharge"><i class="fa fa-wallet"></i> Recharge</a>
    </div>

    <div class="main-content">
        
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h1 class="page-title m-0">User Directory</h1>
                <p class="text-white-50 m-0">Provision structural permissions and access lists for node clients.</p>
            </div>
            
            <a th:href="@{/register}" class="custom-btn btn-primary-custom">
                <i class="fa fa-plus"></i> Enroll New User
            </a>
        </div>

        <div class="table-responsive-wrapper">
            <table class="custom-table">
                <thead>
                    <tr>
                        <th>System UID</th>
                        <th>Identity Profile Name</th>
                        <th>Mobile Identifier</th>
                        <th>Secured Email Address</th>
                        <th class="text-center">Operations Panel</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u:${users}">
                        <td class="text-white-50 font-monospace" th:text="${u.userId}"></td>
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <div class="rounded-circle d-flex align-items-center justify-content-center text-black" style="width:30px; height:30px; background:#00ffff; font-size:12px; font-weight:700;" th:text="${#strings.substring(u.fullName,0,1)}"></div>
                                <span class="fw-bold" th:text="${u.fullName}"></span>
                            </div>
                        </td>
                        <td th:text="${u.mobileNumber}"></td>
                        <td class="text-white-50" th:text="${u.email}"></td>
                        <td>
                            <div class="d-flex justify-content-center gap-2">
                                <a th:href="@{/editUser/{id}(id=${u.userId})}" class="custom-btn btn-warning-custom py-1 px-3 fs-7">
  								  Modify
								</a>
                                <a th:href="@{/deleteUser/{id}(id=${u.userId})}" class="custom-btn btn-danger-custom py-1 px-3 fs-7">
                                    Purge
                                </a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
